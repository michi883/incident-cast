# Authored incident case for the "guide an investigation" workspace.
#
# Decisions PUNCTUATE the investigation — they don't drive every beat. There are exactly
# three decision steps (`choices`); between them the room runs ITSELF: auto steps (`next` +
# `dwell`) where specialists investigate, theories evolve, and weak ones fade without the
# user clicking. Branches rejoin and every path converges on one explanation: a
# "migrate to least-privilege SA" deploy (checkout-api-00042) removed the secretAccessor
# binding checkout needed for the Stripe key.
#
# Each step carries DELTAS (theory-status changes, witness updates, revealed findings) the
# UI folds along the path. Findings cite real fixture SPL + rows; the rule-based aggregator
# still anchors on the revision (build-time guardrail).

id: cloud_run_secret_loss
title: "Checkout outage after deployment"
blurb: "checkout-api 5xx spike two minutes after a revision rollout. Steer the room at a few key moments; it does the rest."
summary: >
  PagerDuty fires on a checkout-api error spike. Four theories are on the table — traffic
  overload, a bad deployment, a secret-access failure, a regional outage. You set the
  priority at a few key moments; between them the room investigates on its own and narrows
  the evidence to the cause.

fixture_dir: "data/fixtures/cloud_run_secret_loss"

incident:
  id: inc-2026-05-26-checkout-spike
  title: "checkout-api 5xx spike and latency degradation"
  triggered_at: "2026-05-26T14:03:00Z"
  earliest: "2026-05-26T13:50:00Z"
  latest: "2026-05-26T14:15:00Z"
  hints:
    service: checkout-api
    env: prod
    region: us-central1

specialists: [reliability, deployment, access, blast_radius]

theories:
  - { id: overload, label: "Traffic overload" }
  - { id: deploy, label: "Bad deployment" }
  - { id: secret, label: "Secret access failure" }
  - { id: regional, label: "Regional outage" }

# ----------------------------------------------------------------------------
# Evidence — each cites real fixture SPL + rows. Referenced from steps by id.
# The `root:checkout-api-00042` tag binds the four specialists into one cluster so the
# rule-based aggregator independently converges on the revision (build-time guardrail).
# ----------------------------------------------------------------------------
findings:
  - id: rel_rate
    specialist: reliability
    timestamp: "2026-05-26T14:02:00Z"
    claim: "Error rate jumped from ~0.5% baseline to ~30% within two minutes starting 14:02."
    severity: critical
    tags: ["symptom:error_rate_spike"]
    source_query_name: reliability_error_rate_over_time
    row_indexes: [0, 13, 14]
  - id: rel_errtype
    specialist: reliability
    timestamp: "2026-05-26T14:02:03Z"
    claim: "The dominant error is PermissionDenied (2,570) on secretmanager.versions.access for checkout-stripe-key — not load."
    severity: critical
    entities: { error_type: PermissionDenied }
    tags: ["root:checkout-api-00042", "error_type:PermissionDenied"]
    source_query_name: reliability_error_type_breakdown
    row_indexes: [0]

  - id: dep_rollback
    specialist: deployment
    timestamp: "2026-05-26T14:01:15Z"
    claim: "No rollback occurred — 0 rollbacks on record; the newest revision (checkout-api-00042) is still serving traffic."
    severity: notable
    tags: ["deploy:no_rollback"]
    source_query_name: deployment_rollback_check
    row_indexes: [0]
  - id: dep_provenance
    specialist: deployment
    timestamp: "2026-05-26T14:01:15Z"
    claim: "Revision checkout-api-00042 deployed 14:01:15 — its commit migrates the runtime SA and removes a binding, 48s before the spike."
    severity: critical
    entities: { revision: checkout-api-00042, build_id: build-20260526-140055-a3f9 }
    tags: ["root:checkout-api-00042", "revision:checkout-api-00042"]
    source_query_name: deployment_revision_provenance
    row_indexes: [0]

  - id: acc_denials
    specialist: access
    timestamp: "2026-05-26T14:02:05Z"
    claim: "583 PERMISSION_DENIED audit events on secretmanager.versions.access, all from the checkout-api runtime SA."
    severity: critical
    entities: { principal: checkout-api@acme-prod.iam.gserviceaccount.com }
    tags: ["access:denials"]
    source_query_name: access_audit_denials_by_principal
    row_indexes: [0]
  - id: acc_iam
    specialist: access
    timestamp: "2026-05-26T14:01:12Z"
    claim: "roles/secretmanager.secretAccessor was REMOVED from the checkout-api SA on checkout-stripe-key at 14:01:12 — 3s before the deploy."
    severity: critical
    entities:
      role: roles/secretmanager.secretAccessor
      secret: checkout-stripe-key
      principal: checkout-api@acme-prod.iam.gserviceaccount.com
    tags: ["root:checkout-api-00042", "iam:binding_removed"]
    source_query_name: access_iam_changes_in_window
    row_indexes: [0]

  - id: blast_endpoint
    specialist: blast_radius
    timestamp: "2026-05-26T14:02:30Z"
    claim: "Checkout write endpoints fail at ~21% while GET /orders sits at ~0.5% — the fault tracks the checkout write path."
    severity: notable
    tags: ["scope:endpoint"]
    source_query_name: blast_radius_error_share_by_endpoint
    row_indexes: [0, 1, 2]
  - id: blast_downstream
    specialist: blast_radius
    timestamp: "2026-05-26T14:02:20Z"
    claim: "Three downstream services (order-fulfillment, notification, payment-gateway) error at ~100% in sympathy with checkout-api."
    severity: notable
    tags: ["scope:downstream"]
    source_query_name: blast_radius_downstream_impact
    row_indexes: [0, 1, 2]
  - id: blast_region
    specialist: blast_radius
    timestamp: "2026-05-26T14:02:30Z"
    claim: "Failure is confined to us-central1 (~27%); us-east1 and eu-west1 stay under 0.5% — consistent with the 00042 rollout."
    severity: critical
    entities: { region: us-central1 }
    tags: ["root:checkout-api-00042", "scope:region"]
    source_query_name: blast_radius_region_share
    row_indexes: [0, 1, 2]

# ----------------------------------------------------------------------------
# Investigation graph: 3 decisions. Each decision kicks off a ~5-beat autonomous
# phase (branch first beat, then merge + shared beats) that flows for several
# seconds before the room asks again. dwell ~2s per beat so a phase feels alive,
# not turn-based. All paths converge.
# ----------------------------------------------------------------------------
start: alert
steps:
  # ============================ DECISION 1 ================================
  - id: alert
    phase: "Alert"
    headline: "PagerDuty fires: checkout-api 5xx spike. Point the room somewhere."
    witnesses:
      - { specialist: reliability, thought: "Standing by on error-rate and latency.", activity: investigating }
      - { specialist: deployment, thought: "Standing by on recent deploys.", activity: investigating }
      - { specialist: access, thought: "Standing by on IAM and audit logs.", activity: investigating }
      - { specialist: blast_radius, thought: "Standing by on impact mapping.", activity: investigating }
    consensus: { text: "Investigation just opened — no theories yet", remaining: 0 }
    prompt: "Where should the room start?"
    choices:
      - { label: "Investigate deployment activity", goto: p1_deploy }
      - { label: "Investigate traffic patterns", goto: p1_traffic }

  # ---- Phase 1: ~5 autonomous beats (branch first, then a shared run) -----
  - id: p1_deploy
    phase: "Deploys"
    headline: "Deployment pulls the release log…"
    theories:
      - { id: deploy, status: possible, reason: "Revision checkout-api-00042 shipped ~90s before the failures." }
    witnesses:
      - { specialist: deployment, thought: "checkout-api-00042 deployed 14:01:15 — 90s before the spike.", supports: deploy, stance: supports, activity: posting, finding: dep_provenance }
    consensus: { text: "A new revision is in frame", remaining: 1 }
    reveal: [dep_provenance]
    next: p1_merge
    dwell: 2.2

  - id: p1_traffic
    phase: "Traffic"
    headline: "Reliability checks load first…"
    theories:
      - { id: overload, status: weakening, reason: "Error rate spiked, but request volume stayed flat." }
    witnesses:
      - { specialist: reliability, thought: "Request volume is flat through the spike — this isn't a surge.", supports: overload, stance: weakens, activity: posting, finding: rel_rate }
    consensus: { text: "Overload already looks weak", remaining: 1 }
    reveal: [rel_rate]
    next: p1_merge
    dwell: 2.2

  - id: p1_merge
    phase: "Cross-talk"
    headline: "The other angle comes in — now two leads are on the board."
    theories:
      - { id: overload, status: weakening, reason: "Request volume was flat through the spike." }
      - { id: deploy, status: possible, reason: "Revision checkout-api-00042 shipped ~90s before the failures." }
    witnesses:
      - { specialist: reliability, thought: "Volume is flat — overload doesn't explain this.", supports: overload, stance: weakens, activity: revising, finding: rel_rate }
      - { specialist: deployment, thought: "And a fresh revision landed right before the spike.", supports: deploy, stance: supports, activity: posting, finding: dep_provenance }
    consensus: { text: "Two leads: a fresh deploy and a fading overload theory", remaining: 2 }
    reveal: [rel_rate, dep_provenance]
    next: p1_scope
    dwell: 2.0

  - id: p1_scope
    phase: "Scope"
    headline: "Blast Radius maps where it hurts…"
    theories:
      - { id: regional, status: possible, reason: "Errors look concentrated in us-central1." }
      - { id: secret, status: forming, reason: "A trickle of permission-denied errors is showing up." }
    witnesses:
      - { specialist: blast_radius, thought: "Checkout write endpoints fail ~21%; GET /orders only ~0.5%.", supports: regional, stance: supports, activity: posting, finding: blast_endpoint }
      - { specialist: access, thought: "Permission-denied errors are mounting — pulling the audit log.", activity: investigating }
    consensus: { text: "No consensus — four theories on the table", remaining: 4 }
    reveal: [blast_endpoint]
    next: p1_denials
    dwell: 2.4

  - id: p1_denials
    phase: "Denials"
    headline: "Access hits a wall of permission denials."
    theories:
      - { id: secret, status: strengthening, reason: "583 PermissionDenied on the Stripe secret dominate the errors." }
    witnesses:
      - { specialist: access, thought: "583 PERMISSION_DENIED on secretmanager.versions.access — all from the checkout SA.", supports: secret, stance: supports, activity: posting, finding: acc_denials }
    consensus: { text: "Secret access is climbing the board", remaining: 4, leading_theory: secret }
    reveal: [acc_denials]
    next: p1_react
    dwell: 2.6

  - id: p1_react
    phase: "Reaction"
    headline: "Reliability drops overload — the errors are denials, not load."
    theories:
      - { id: overload, status: eliminated, reason: "Volume was flat and every error is a permission denial — not load." }
      - { id: secret, status: strengthening, reason: "PermissionDenied explains the spike better than anything else." }
    witnesses:
      - { specialist: reliability, thought: "Every 5xx in my breakdown is a PermissionDenied — I'm off overload, onto secret access.", supports: secret, stance: supports, activity: revising, finding: rel_errtype }
    consensus: { text: "Overload ruled out — secret access leads", remaining: 3, leading_theory: secret }
    reveal: [rel_errtype]
    next: decision2
    dwell: 2.4

  # ============================ DECISION 2 ================================
  - id: decision2
    phase: "Narrow"
    headline: "Something revoked checkout's access right as it deployed. How should the room confirm it?"
    consensus: { text: "Secret access leads — what broke it?", remaining: 3, leading_theory: secret }
    prompt: "How should the room nail down the cause?"
    choices:
      - { label: "Inspect IAM changes", goto: p2_iam }
      - { label: "Verify rollback behavior", goto: p2_rollback }

  # ---- Phase 2: ~4 autonomous beats --------------------------------------
  - id: p2_iam
    phase: "IAM"
    headline: "Access pulls the IAM change log — and finds the smoking gun."
    theories:
      - { id: secret, status: strengthening, reason: "secretAccessor was removed from the SA at 14:01:12 — 3s before 00042." }
    witnesses:
      - { specialist: access, thought: "roles/secretmanager.secretAccessor REMOVED from the checkout SA at 14:01:12.", supports: secret, stance: supports, activity: posting, finding: acc_iam }
    consensus: { text: "The mechanism is in view", remaining: 2, leading_theory: secret }
    reveal: [acc_iam]
    next: p2_merge
    dwell: 2.6

  - id: p2_rollback
    phase: "Rollback"
    headline: "Deployment checks rollback state — the bad revision is still live."
    theories:
      - { id: deploy, status: strengthening, reason: "No rollback happened; 00042 is still serving traffic." }
    witnesses:
      - { specialist: deployment, thought: "0 rollbacks on record — 00042 is still serving.", supports: deploy, stance: supports, activity: posting, finding: dep_rollback }
    consensus: { text: "The suspect revision is still live", remaining: 2, leading_theory: secret }
    reveal: [dep_rollback]
    next: p2_merge
    dwell: 2.2

  - id: p2_merge
    phase: "Link"
    headline: "The deploy and the revoked binding line up to the second."
    theories:
      - { id: deploy, status: strengthening, reason: "Revision 00042's commit migrates the runtime SA — the likely trigger." }
      - { id: secret, status: strengthening, reason: "The binding vanished inside the 00042 rollout window." }
    witnesses:
      - { specialist: deployment, thought: "00042's commit migrates the service account — that's what dropped the binding.", supports: deploy, stance: supports, activity: posting, finding: dep_provenance }
      - { specialist: access, thought: "Removal at 14:01:12, deploy at 14:01:15 — three seconds apart.", supports: secret, stance: supports, activity: posting, finding: acc_iam }
    consensus: { text: "Cause and trigger are lining up", remaining: 2, leading_theory: secret }
    reveal: [dep_provenance, acc_iam]
    next: p2_blast
    dwell: 2.2

  - id: p2_blast
    phase: "Cross-check"
    headline: "Blast Radius confirms it — dependents fail region-wide on that one secret."
    theories:
      - { id: regional, status: eliminated, reason: "Downstream services fail region-wide on the same secret — scope tracks the secret, not the region." }
      - { id: secret, status: leading, reason: "Permission denials on the Stripe secret explain every failing request." }
    witnesses:
      - { specialist: blast_radius, thought: "order-fulfillment, payment-gateway, notification all fail ~100% on the same secret.", supports: secret, stance: supports, activity: posting, finding: blast_downstream }
    consensus: { text: "Two theories remain — and they're the same story", remaining: 2, leading_theory: secret }
    reveal: [blast_downstream, blast_region]
    next: decision3
    dwell: 2.4

  # ============================ DECISION 3 ================================
  - id: decision3
    phase: "Converge"
    headline: "The deploy revoked the secret binding checkout needed. Ready to call it?"
    consensus: { text: "2 theories remain — ready to converge?", remaining: 2, leading_theory: secret }
    prompt: "Is the room ready to converge?"
    choices:
      - { label: "Converge on explanation", goto: converged }
      - { label: "Inspect more evidence", goto: p3_more }

  # ---- Phase 3 (optional deeper pass) ------------------------------------
  - id: p3_more
    phase: "Double-check"
    headline: "One last pass: 100% of the 5xx are denials on that exact secret."
    theories:
      - { id: secret, status: strengthening, reason: "100% of the 5xx are PermissionDenied on checkout-stripe-key." }
    witnesses:
      - { specialist: reliability, thought: "Every failing request is a denial on the Stripe secret.", supports: secret, stance: supports, activity: posting, finding: rel_errtype }
      - { specialist: access, thought: "And the binding was removed 3s before the deploy.", supports: secret, stance: supports, activity: posting, finding: acc_iam }
    consensus: { text: "The evidence is unanimous", remaining: 1, leading_theory: secret }
    reveal: [rel_errtype, acc_iam]
    next: converged
    dwell: 2.6

  # ============================ TERMINAL ==================================
  - id: converged
    phase: "Complete"
    headline: "Secret access failure, triggered by revision checkout-api-00042."
    theories:
      - { id: overload, status: eliminated, reason: "Request volume was flat — overload ruled out." }
      - { id: regional, status: eliminated, reason: "Scope tracks the secret, not the region." }
      - { id: deploy, status: strengthening, reason: "The trigger: revision 00042 removed the secretAccessor binding." }
      - { id: secret, status: confirmed, reason: "checkout lost access to its Stripe secret — every 5xx traces here." }
    witnesses:
      - { specialist: reliability, thought: "PermissionDenied dominated the 5xx.", supports: secret, stance: supports, activity: idle, finding: rel_errtype }
      - { specialist: deployment, thought: "Revision checkout-api-00042 was the trigger.", supports: deploy, stance: supports, activity: idle, finding: dep_provenance }
      - { specialist: access, thought: "Binding removed at 14:01:12; 583 denials followed.", supports: secret, stance: supports, activity: idle, finding: acc_iam }
      - { specialist: blast_radius, thought: "Confined to us-central1; dependents fail on the same secret.", supports: secret, stance: supports, activity: idle, finding: blast_region }
    consensus:
      text: "Root cause isolated: Secret access failure tied to revision checkout-api-00042"
      remaining: 1
      leading_theory: secret
      converged: true
    reveal: [rel_rate, rel_errtype, dep_rollback, dep_provenance, acc_denials, acc_iam, blast_endpoint, blast_downstream, blast_region]
